services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: horseracing
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d horseracing"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: horse-racing-api
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/horseracing
      SECRET_KEY: ${SECRET_KEY:-local-development-secret-key-change-before-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-local-admin-token}
      SYNC_LOOKAHEAD_DAYS: ${SYNC_LOOKAHEAD_DAYS:-1}
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-15}
      RACING_FORM_PROVIDER: ${RACING_FORM_PROVIDER:-generic_http}
      RACING_FORM_API_BASE_URL: ${RACING_FORM_API_BASE_URL:-}
      RACING_FORM_API_KEY: ${RACING_FORM_API_KEY:-}
      RACING_FORM_API_KEY_HEADER: ${RACING_FORM_API_KEY_HEADER:-Authorization}
      RACING_FORM_MEETINGS_PATH: ${RACING_FORM_MEETINGS_PATH:-/racecards}
      RACING_FORM_RACECARD_PATH: ${RACING_FORM_RACECARD_PATH:-/racecards/{meeting_id}}
      RACING_FORM_RESULTS_PATH: ${RACING_FORM_RESULTS_PATH:-/results}
      ODDS_PROVIDER: ${ODDS_PROVIDER:-generic_http}
      ODDS_API_BASE_URL: ${ODDS_API_BASE_URL:-}
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      ODDS_API_KEY_HEADER: ${ODDS_API_KEY_HEADER:-Authorization}
      ODDS_MARKETS_PATH: ${ODDS_MARKETS_PATH:-/odds}
      SCRAPING_RATE_LIMIT_SECONDS: ${SCRAPING_RATE_LIMIT_SECONDS:-3}
      SCRAPING_HTTP_TIMEOUT_SECONDS: ${SCRAPING_HTTP_TIMEOUT_SECONDS:-20}
      SCRAPING_USER_AGENT: ${SCRAPING_USER_AGENT:-HorseRacingAnalyticsBot/0.1}
      TAB_SCRAPE_URL: ${TAB_SCRAPE_URL:-}
      SPORTSBET_SCRAPE_URL: ${SPORTSBET_SCRAPE_URL:-}
      RACING_COM_SCRAPE_URL: ${RACING_COM_SCRAPE_URL:-}
      PUNTERS_SCRAPE_URL: ${PUNTERS_SCRAPE_URL:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: horse-racing-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
